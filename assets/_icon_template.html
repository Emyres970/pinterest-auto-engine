<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    background: #111111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .symbol {
    font-size: 160px;
    color: #4DBFE8;
    font-family: serif;
    line-height: 1;
    margin-bottom: 18px;
    letter-spacing: -4px;
  }
  .brand {
    font-family: 'Anton', 'Arial Black', Impact, sans-serif;
    font-size: 52px;
    color: #FFFFFF;
    letter-spacing: 6px;
    text-transform: uppercase;
    line-height: 1;
  }
  .sub {
    font-family: Arial, sans-serif;
    font-size: 18px;
    color: #4DBFE8;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 10px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="symbol">&#8734;</div>
  <div class="brand">TOP LOVE</div>
  <div class="brand">HACKS</div>
  <div class="sub">PUBLISHER</div>
</body>
</html>
