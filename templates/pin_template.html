<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1000px;
    height: 1500px;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 90px 75px 50px;
    text-align: center;
  }

  .headline {
    font-family: 'Anton', 'Arial Black', Impact, sans-serif;
    font-size: 112px;
    line-height: 1.07;
    color: #111111;
    text-transform: uppercase;
    letter-spacing: 1px;
    word-break: break-word;
  }

  .headline .accent {
    color: #4DBFE8;
  }

  .footer {
    width: 100%;
    padding: 0 75px 55px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .divider {
    width: 220px;
    height: 3px;
    background: #111111;
    margin-bottom: 10px;
  }

  .brand-symbol {
    font-size: 34px;
    color: #111111;
    font-family: serif;
    line-height: 1;
  }

  .brand-name {
    font-family: Arial, sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 5px;
    color: #111111;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="main">
    <div class="headline" id="hl">{{HEADLINE_HTML}}</div>
  </div>
  <div class="footer">
    <div class="divider"></div>
    <div class="brand-symbol">&#8734;</div>
    <div class="brand-name">{{BRAND_NAME}}</div>
  </div>

  <script>
    // Auto-shrink font if headline overflows its container
    const hl = document.getElementById('hl');
    const container = hl.parentElement;
    let size = 112;
    while (hl.scrollHeight > container.clientHeight - 20 && size > 48) {
      size -= 3;
      hl.style.fontSize = size + 'px';
    }
  </script>
</body>
</html>
