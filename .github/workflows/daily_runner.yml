name: Pinterest Automation

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows you to run it manually from the GitHub App

permissions:
  contents: write # Needed to save the updated CSV

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Automation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python main.py

      - name: Commit and Push Changes (Update CSV)
        run: |
          git config --global user.name 'PinterestBot'
          git config --global user.email 'bot@noreply.github.com'
          git add content_log.csv
          git commit -m "Update content log status" || echo "No changes to commit"
          git push
