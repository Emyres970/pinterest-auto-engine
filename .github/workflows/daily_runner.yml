name: Pinterest Automation

on:
  schedule:
    - cron: '0 8 * * *'   # Runs once daily at 8 AM UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINTEREST_EMAIL: ${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD: ${{ secrets.PINTEREST_PASSWORD }}
          PINTEREST_BOARD_NAME: ${{ secrets.PINTEREST_BOARD_NAME }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
          PINS_PER_DAY: 15
          DELAY_BETWEEN_PINS: 300
        run: python main.py

      - name: Commit tracker update
        run: |
          git config user.name 'PinterestBot'
          git config user.email 'bot@noreply.github.com'
          git add tracker.csv
          git diff --staged --quiet || git commit -m "chore: update tracker $(date -u +%Y-%m-%d)"
          git push
