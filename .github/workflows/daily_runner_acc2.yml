name: Pinterest Automation — Narc Spotlight

on:
  schedule:
    - cron: '0 12 * * *'   # Runs daily at 12:00 UTC (4 hours after Account 1)
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Restore Pinterest session cookies
        run: |
          if [ -n "$PINTEREST_COOKIES_B64" ]; then
            echo "$PINTEREST_COOKIES_B64" | base64 -d > .pinterest_cookies.json
            echo "Session cookies restored."
          else
            echo "No PINTEREST_COOKIES_B64_ACC2 secret found — will log in fresh with email/password."
          fi
        env:
          PINTEREST_COOKIES_B64: ${{ secrets.PINTEREST_COOKIES_B64_ACC2 }}

      - name: Run automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PINTEREST_EMAIL: ${{ secrets.PINTEREST_EMAIL_ACC2 }}
          PINTEREST_PASSWORD: ${{ secrets.PINTEREST_PASSWORD_ACC2 }}
          PINTEREST_BOARD_MAP: ${{ secrets.PINTEREST_BOARD_MAP_ACC2 }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
          BRAND_URL: ${{ secrets.BRAND_URL }}
          PINS_PER_DAY: 15
          DELAY_BETWEEN_PINS: 300
        run: python main.py

      - name: Save updated cookies as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: narc-spotlight-cookies-${{ github.run_number }}
          path: .pinterest_cookies.json
          retention-days: 35
          if-no-files-found: ignore

      - name: Save debug screenshots/HTML as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: narc-spotlight-debug-${{ github.run_number }}
          path: |
            output/_debug_*.png
            output/_debug_*.html
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit tracker update
        run: |
          git config user.name 'PinterestBot'
          git config user.email 'bot@noreply.github.com'
          git add tracker.csv
          git diff --staged --quiet || git commit -m "chore: update tracker $(date -u +%Y-%m-%d) [acc2]"
          git push
